# Render deployment manifest for HRMS project
# Single service: Express backend serves the built frontend

services:
  - type: web_service
    name: hrms
    env: node
    plan: free
    branch: main
    buildCommand: "cd backend && npm install && cd ../frontend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: MONGODB_URI
        value: "YOUR_MONGODB_URI"
      - key: JWT_SECRET
        value: "YOUR_JWT_SECRET"
      - key: JWT_REFRESH_SECRET
        value: "YOUR_JWT_REFRESH_SECRET"
      - key: FRONTEND_URL
        value: "https://your-app.onrender.com"
      - key: VITE_API_URL
        value: "/api"
