# Render deployment manifest for HRMS project
# Single service: Express backend serves the built frontend

services:
  - type: web
    name: hrms
    env: node
    plan: free
    branch: main
    buildCommand: "cd backend && npm install && cd ../frontend && npm install && npm run build"
    startCommand: "cd backend && npm install && npm start"
    envVars:
      - key: MONGODB_URI
        fromDatabase: hrms-mongo
      - key: JWT_SECRET
        value: "your_jwt_secret_here"
      - key: JWT_REFRESH_SECRET
        value: "your_jwt_refresh_secret_here"
      - key: FRONTEND_URL
        value: "https://hrms.onrender.com"
      - key: VITE_API_URL
        value: "/api"
