# Render deployment manifest for HRMS project
# Single service: Express backend serves the built frontend

services:
  - type: web
    name: hrms
    env: node
    plan: free
    branch: main
    buildCommand: "cd backend && npm install && cd ../frontend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_VERSION
        value: "20"